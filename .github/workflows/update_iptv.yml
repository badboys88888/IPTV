name: Update IPTV Sources

on:
  schedule:
    - cron: '0 2 * * *'          # 每天 UTC 2:00（北京时间 10:00）
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'config.json'            # 配置文件变更时自动运行

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests

      - name: Ensure output directory exists
        run: mkdir -p output

      - name: Run updater script
        env:
          FOFA_KEY: ${{ secrets.FOFA_KEY }}
        run: python udp/update_iptv.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          if git diff --cached --quiet; then
            echo "No changes to commit, exiting gracefully."
          else
            git commit -m "🔄 自动更新 IPTV 源 ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
