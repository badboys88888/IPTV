name: Update IPTV Sources

# 同一时间只允许一个实例运行，避免自己打自己产生冲突
concurrency: update-iptv

on:
  schedule:
    - cron: '0 2 * * *'          # 北京时间 10:00
  workflow_dispatch:              # 支持手动触发
  push:
    branches:
      - main
    paths:
      - 'config.json'            # 当配置文件更新时自动运行

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write            # 必须，用于强制推送

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # 拉取所有历史以保证强制推送安全

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      # ★ 恢复 FOFA 缓存（避免重复下载消耗额度）
      - name: Restore FOFA cache
        uses: actions/cache@v4
        with:
          path: udp/fofa_cache.json
          key: fofa-cache-${{ hashFiles('config.json') }}
          restore-keys: |
            fofa-cache-

      - name: Run IPTV updater
        env:
          FOFA_KEY: ${{ secrets.FOFA_KEY }}
        run: python udp/update_iptv.py

      # ★ 保存 FOFA 缓存（即使后续步骤失败也保存）
      - name: Save FOFA cache
        if: always()
        uses: actions/cache@v4
        with:
          path: udp/fofa_cache.json
          key: fofa-cache-${{ hashFiles('config.json') }}

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 根据脚本生成的列表添加文件
          if [ -f output_files.txt ]; then
            xargs -a output_files.txt git add
          fi

          # 检查是否有变更
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🔄 自动更新 IPTV 源 ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            # 直接强制推送，避免 rebase/merge 冲突（因为脚本生成的文件就是最终版本）
            git push --force-with-lease origin main
          fi
