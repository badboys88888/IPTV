name: Update IPTV Sources

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'config.json'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # 明确要求写入权限

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Ensure output directory
        run: mkdir -p output

      - name: Run updater script
        env:
          FOFA_KEY: ${{ secrets.FOFA_KEY }}
        run: python udp/update_iptv.py

      - name: Show git status
        run: |
          echo "=== Git status ==="
          git status
          echo "=== Git remote ==="
          git remote -v

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 检查 output/ 目录是否有变更
          if [ -z "$(git status --porcelain output/)" ]; then
            echo "output/ 目录无变更，跳过提交和推送。"
          else
            echo "检测到变更，开始提交..."
            git add output/
            git commit -m "🔄 自动更新 IPTV 源 ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
