name: Update IPTV Sources

on:
  schedule:
    - cron: '0 2 * * *'          # 北京时间 10:00
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'config.json'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run IPTV updater
        env:
          FOFA_KEY: ${{ secrets.FOFA_KEY }}
        run: python udp/update_iptv.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f output_files.txt ]; then
            xargs -a output_files.txt git add
          fi
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🔄 自动更新 IPTV 源 ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
          fi
