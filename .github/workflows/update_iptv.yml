name: Update IPTV Sources

on:
  schedule:
    - cron: '0 2 * * *'          # 每天 UTC 2:00
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'config.json'

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests

      - name: Ensure output directory exists
        run: mkdir -p output

      - name: Run updater script
        env:
          FOFA_KEY: ${{ secrets.FOFA_KEY }}
        run: python udp/update_iptv.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 检查 output/ 目录是否有任何变更（包括新增、修改、删除）
          if [ -z "$(git status --porcelain output/)" ]; then
            echo "output/ 目录无变化，跳过提交与推送。"
          else
            echo "检测到 output/ 变更，正在提交..."
            git add output/
            git commit -m "🔄 自动更新 IPTV 源 ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
