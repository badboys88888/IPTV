name: Auto Scanner

on:
  schedule:
    - cron: '0 0 * * *'  # 每天自动运行一次
  workflow_dispatch:      # 支持手动点击按钮运行

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # 关键：必须有写入权限
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install aiohttp

      - name: Run Scanner
        run: |
          # 运行脚本
          python scan/scanner.py
          # 打印 scan 文件夹内容，方便在日志里排错
          ls -lh scan/

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 确保结果文件存在，即使是空的
          touch scan/useful_proxies.txt
          
          git add scan/useful_proxies.txt
          # 如果文件没有变化，commit 会跳过而不会导致任务失败
          git commit -m "自动更新扫描结果 [$(date)]" || exit 0
          git push
