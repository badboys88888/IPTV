name: Auto Port Scanner

on:
  schedule:
    - cron: '0 0 * * *'  # 每天自动运行
  workflow_dispatch:      # 支持手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # --- 关键修改处 ---
      - name: Run Scanner
        run: |
          mkdir -p scan
          python scan/scanner.py

      - name: Commit results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # 如果没有生成文件，创建一个空的，防止报错
          touch scan/results.txt
          git add scan/results.txt
          git commit -m "Update scan results" || exit 0
          git push


