name: Socks5 Checker

on:
  workflow_dispatch: # 手动触发

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须赋予写权限，否则无法推送结果回仓库

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install aiohttp aiohttp_socks

    - name: Run Scanner
      working-directory: ./scan
      run: |
        # 即使没有 run_check.py 也要确保文件名与你仓库里的一致
        # 如果你仓库里叫 socks5-checker.py，请把下面这行改掉
        python run_check.py

    - name: Commit results
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        
        # 检查文件是否存在
        if [ -f "scan/success.txt" ]; then
          git add scan/success.txt
          # 只有在有内容变化时才提交，避免报错
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update success list" && git push)
        else
          echo "没有生成 success.txt，跳过提交。"
        fi
