name: Socks5 Checker

on:
  workflow_dispatch: # 手动触发

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 赋予提交结果的权限

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install aiohttp aiohttp_socks

    - name: Run Scanner
      # 注意：working-directory 应该和 run 平级，且在 run 的上面
      working-directory: ./scan
      run: |
        python socks5-checker.py

    - name: Commit results
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add scan/success.txt
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update success list" && git push)
