name: Parse ProxyIP CSV

on:
  schedule:
    - cron: '0 1 * * *'      # 每天 UTC 1:00 运行
  workflow_dispatch:          # 允许手动触发

jobs:
  parse-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 查看 proxyip 文件夹内容（调试）
        run: ls -la proxyip/

      - name: 运行解析脚本
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: python parse_proxyip.py

      - name: 提交 txt 和缓存文件回仓库
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add proxyip_output.txt ip_cache.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: update proxyip_output and ip_cache [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
